name = "ada-auth"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./build/client"

[[d1_databases]]
binding = "DB"
database_name = "ada-auth-db"
database_id = "placeholder-replace-with-real-id"

[[kv_namespaces]]
binding = "SESSIONS"
id = "placeholder-sessions-id"

[[kv_namespaces]]
binding = "EMAIL_TOKENS"
id = "placeholder-email-tokens-id"

[[kv_namespaces]]
binding = "MAGIC_TOKENS"
id = "placeholder-magic-tokens-id"

[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "placeholder-rate-limits-id"

[[r2_buckets]]
binding = "PROFILE_PHOTOS"
bucket_name = "ada-auth-profile-photos"

[vars]
COOKIE_DOMAIN = ".adapos.tech"
AUTH_URL = "https://adapos.tech"

[dev]
port = 5173
